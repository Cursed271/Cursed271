name: Update
on: 
    workflow_dispatch:
jobs: 
    update-readme-with-blog: 
        name: Update
        runs-on: ubuntu-latest
        steps: 
            - uses: actions/checkout@v2
            - uses: gautamkrishnar/blog-post-workflow@master
              with: 
                max_post_count: "5"
                feed_list: "https://renanfranca.github.io/feed.xml"
